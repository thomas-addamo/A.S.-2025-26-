<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API REST - Videogiochi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 32px;
            border-bottom: 2px solid #7c3aed;
            text-align: center;
        }

        header h1 {
            font-size: 2rem;
            color: #a78bfa;
            margin-bottom: 6px;
        }

        header p { color: #94a3b8; font-size: 0.95rem; }

        .container {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 20px;
            display: grid;
            gap: 24px;
        }

        .card {
            background: #1a1a2e;
            border: 1px solid #2d2d4e;
            border-radius: 12px;
            padding: 24px;
        }

        .card h2 {
            font-size: 1.1rem;
            color: #a78bfa;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Badge metodo HTTP */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .get    { background: #064e3b; color: #34d399; }
        .post   { background: #1e3a5f; color: #60a5fa; }
        .put    { background: #451a03; color: #fb923c; }
        .delete { background: #450a0a; color: #f87171; }

        /* Form */
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 4px; }

        input, textarea, select {
            width: 100%;
            background: #0f0f1a;
            border: 1px solid #2d2d4e;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 10px 12px;
            font-size: 0.9rem;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus { border-color: #7c3aed; }

        textarea { resize: vertical; min-height: 80px; font-family: monospace; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        button {
            background: #7c3aed;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #6d28d9; }

        /* Risposta */
        .response-box {
            margin-top: 16px;
            background: #0f0f1a;
            border: 1px solid #2d2d4e;
            border-radius: 8px;
            padding: 14px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 48px;
            color: #94a3b8;
            display: none;
        }
        .response-box.ok    { border-color: #34d399; color: #34d399; display: block; }
        .response-box.error { border-color: #f87171; color: #f87171; display: block; }

        /* Lista giochi */
        #lista-giochi { display: grid; gap: 10px; }
        .gioco-card {
            background: #0f0f1a;
            border: 1px solid #2d2d4e;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .gioco-card .info strong { color: #e0e0e0; }
        .gioco-card .info span  { font-size: 0.8rem; color: #64748b; }
        .gioco-card .rating     { color: #fbbf24; font-weight: bold; }

        .endpoint-url {
            font-family: monospace;
            background: #0f0f1a;
            border: 1px solid #2d2d4e;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.82rem;
            color: #7c3aed;
        }

        hr { border: none; border-top: 1px solid #2d2d4e; margin: 12px 0; }
    </style>
</head>
<body>

<header>
    <h1>API REST — Videogiochi</h1>
    <p>Interfaccia di test per le rotte <span style="color:#7c3aed">/api/items</span></p>
</header>

<div class="container">

    <!-- GET tutti -->
    <div class="card">
        <h2><span class="badge get">GET</span> Tutti i videogiochi <span class="endpoint-url">/api/items</span></h2>
        <button onclick="getAll()">Esegui GET</button>
        <div id="lista-giochi" style="margin-top:16px"></div>
    </div>

    <!-- GET per ID -->
    <div class="card">
        <h2><span class="badge get">GET</span> Singolo videogioco <span class="endpoint-url">/api/items/:id</span></h2>
        <label>ID</label>
        <input type="number" id="get-id" placeholder="es. 1" style="width:160px">
        <button onclick="getById()">Esegui GET</button>
        <div class="response-box" id="res-getone"></div>
    </div>

    <!-- POST -->
    <div class="card">
        <h2><span class="badge post">POST</span> Aggiungi videogioco <span class="endpoint-url">/api/items</span></h2>
        <div class="row">
            <div>
                <label>Nome *</label>
                <input type="text" id="post-name" placeholder="es. Elden Ring">
            </div>
            <div>
                <label>Genere</label>
                <input type="text" id="post-genre" placeholder="es. Action RPG">
            </div>
        </div>
        <div class="row">
            <div>
                <label>Anno</label>
                <input type="number" id="post-year" placeholder="es. 2022">
            </div>
            <div>
                <label>Rating (0-10)</label>
                <input type="number" id="post-rating" placeholder="es. 9.5" step="0.1" min="0" max="10">
            </div>
        </div>
        <button onclick="postItem()">Esegui POST</button>
        <div class="response-box" id="res-post"></div>
    </div>

    <!-- PUT -->
    <div class="card">
        <h2><span class="badge put">PUT</span> Modifica videogioco <span class="endpoint-url">/api/items/:id</span></h2>
        <label>ID da modificare</label>
        <input type="number" id="put-id" placeholder="es. 1" style="width:160px; margin-bottom:12px">
        <hr>
        <div class="row">
            <div>
                <label>Nuovo nome</label>
                <input type="text" id="put-name" placeholder="lascia vuoto per non modificare">
            </div>
            <div>
                <label>Nuovo genere</label>
                <input type="text" id="put-genre" placeholder="lascia vuoto per non modificare">
            </div>
        </div>
        <div class="row">
            <div>
                <label>Nuovo anno</label>
                <input type="number" id="put-year" placeholder="lascia vuoto per non modificare">
            </div>
            <div>
                <label>Nuovo rating</label>
                <input type="number" id="put-rating" placeholder="lascia vuoto per non modificare" step="0.1" min="0" max="10">
            </div>
        </div>
        <button onclick="putItem()">Esegui PUT</button>
        <div class="response-box" id="res-put"></div>
    </div>

    <!-- DELETE -->
    <div class="card">
        <h2><span class="badge delete">DELETE</span> Elimina videogioco <span class="endpoint-url">/api/items/:id</span></h2>
        <label>ID da eliminare</label>
        <input type="number" id="delete-id" placeholder="es. 1" style="width:160px">
        <button onclick="deleteItem()" style="background:#7f1d1d">Esegui DELETE</button>
        <div class="response-box" id="res-delete"></div>
    </div>

</div>

<script>
    const BASE = "http://localhost:3000/api/items";

    function showResponse(id, data, ok) {
        const box = document.getElementById(id);
        box.textContent = JSON.stringify(data, null, 2);
        box.className = "response-box " + (ok ? "ok" : "error");
    }

    async function getAll() {
        try {
            const res  = await fetch(BASE);
            const data = await res.json();
            renderList(Array.isArray(data) ? data : []);
        } catch (e) { renderList([]); }
    }

    function renderList(items) {
        const container = document.getElementById("lista-giochi");
        if (!items.length) { container.innerHTML = "<p style='color:#64748b'>Nessun risultato</p>"; return; }
        container.innerHTML = items.map(g => `
            <div class="gioco-card">
                <div class="info">
                    <strong>${g.name}</strong><br>
                    <span>${g.genre ?? "—"} &bull; ${g.year ?? "—"} &bull; ID: ${g.id}</span>
                </div>
                <div class="rating">★ ${g.rating ?? "—"}</div>
            </div>
        `).join("");
    }

    async function getById() {
        const id = document.getElementById("get-id").value;
        if (!id) return alert("Inserisci un ID");
        try {
            const res  = await fetch(`${BASE}/${id}`);
            const data = await res.json();
            showResponse("res-getone", data, res.ok);
        } catch (e) { showResponse("res-getone", { error: "Server non raggiungibile" }, false); }
    }

    async function postItem() {
        const name   = document.getElementById("post-name").value.trim();
        const genre  = document.getElementById("post-genre").value.trim();
        const year   = document.getElementById("post-year").value;
        const rating = document.getElementById("post-rating").value;
        if (!name) return alert("Il nome e' obbligatorio");

        const body = { name };
        if (genre)  body.genre  = genre;
        if (year)   body.year   = parseInt(year);
        if (rating) body.rating = parseFloat(rating);

        try {
            const res  = await fetch(BASE, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
            const data = await res.json();
            showResponse("res-post", data, res.ok);
        } catch (e) { showResponse("res-post", { error: "Server non raggiungibile" }, false); }
    }

    async function putItem() {
        const id = document.getElementById("put-id").value;
        if (!id) return alert("Inserisci un ID");

        const name   = document.getElementById("put-name").value.trim();
        const genre  = document.getElementById("put-genre").value.trim();
        const year   = document.getElementById("put-year").value;
        const rating = document.getElementById("put-rating").value;

        const body = {};
        if (name)   body.name   = name;
        if (genre)  body.genre  = genre;
        if (year)   body.year   = parseInt(year);
        if (rating) body.rating = parseFloat(rating);

        if (!Object.keys(body).length) return alert("Modifica almeno un campo");

        try {
            const res  = await fetch(`${BASE}/${id}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
            const data = await res.json();
            showResponse("res-put", data, res.ok);
        } catch (e) { showResponse("res-put", { error: "Server non raggiungibile" }, false); }
    }

    async function deleteItem() {
        const id = document.getElementById("delete-id").value;
        if (!id) return alert("Inserisci un ID");
        if (!confirm(`Eliminare l'elemento con ID ${id}?`)) return;

        try {
            const res  = await fetch(`${BASE}/${id}`, { method: "DELETE" });
            const data = await res.json();
            showResponse("res-delete", data, res.ok);
        } catch (e) { showResponse("res-delete", { error: "Server non raggiungibile" }, false); }
    }

    // Carica lista all'avvio
    getAll();
</script>

</body>
</html>
